# .github/workflows/docker-build.yml
name: CI / CD – Build & Push Docker Image

# --------------------------------------------------------------
# 1️⃣  Trigger
# --------------------------------------------------------------
on:
  push:
    branches:
      - main          # bei jedem Push auf main (Produktions‑Branch)
      - develop       # optional: auch für develop‑Branch
    tags:
      - 'v*'          # bei Release‑Tags, z. B. v1.2.3
  pull_request:
    branches:
      - main
      - develop

# --------------------------------------------------------------
# 2️⃣  Jobs
# --------------------------------------------------------------
jobs:
  # ------------------------------------------------------------
  # 2.1  Build & Push Job – startet nur, wenn "tests" erfolgreich
  # ------------------------------------------------------------
  build_and_push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # --------------------------------------------------------
    # 2.1.1  Environment – definiere Variablen, die im Build
    #        verwendet werden (z. B. Django‑Settings)
    # --------------------------------------------------------
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/facenode   # -> Docker‑Hub‑Repo
      # Tag‑Varianten:
      #   latest            (immer)
      #   sha-${GITHUB_SHA} (eindeutig pro Commit)
      #   branch-${GITHUB_REF_NAME} (z. B. branch‑develop)
      LATEST_TAG: latest
      SHA_TAG: sha-${{ github.sha }}
      BRANCH_TAG: branch-${{ github.ref_name }}

    steps:
      # --------------------------------------------------------
      # 2.1.2  Checkout (wir brauchen den Code für den Build)
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # 2.1.3  Login to Docker Hub
      # --------------------------------------------------------
      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --------------------------------------------------------
      # 2.1.4  Set up Docker Buildx (multi‑arch, caching)
      # --------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --------------------------------------------------------
      # 2.1.5  Optional – restore a previous build cache
      # --------------------------------------------------------
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # --------------------------------------------------------
      # 2.1.6  Build & push the image (multiple tags)
      # --------------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile                     # Pfad zu deinem Docker‑File (standard)
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.LATEST_TAG }}
            ${{ env.IMAGE_NAME }}:${{ env.SHA_TAG }}
            ${{ env.IMAGE_NAME }}:${{ env.BRANCH_TAG }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      # --------------------------------------------------------
      # 2.1.7  (Optional) – ausgeben, welcher Tag jetzt live ist
      # --------------------------------------------------------
      - name: Show image info
        run: |
          echo "✅ Image ${{ env.IMAGE_NAME }}:${{ env.LATEST_TAG }} pushed."
          echo "   – SHA tag: ${{ env.SHA_TAG }}"
          echo "   – Branch tag: ${{ env.BRANCH_TAG }}"